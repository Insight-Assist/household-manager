<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>House Manager</title>

<script src="config.js" onerror="window.__CONFIG_MISSING=true"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @page { size: letter portrait; margin: 0.35in; }

  :root {
    --ivory: #FBF7F0;
    --bg: #E6E0D4;
    --tile-bg: #F1ECE2;
    --tile-bg-soft: #F5F1E8;
    --border: #D8D2C5;
    --divider: #E5DFD3;
    --text: #2D2A26;
    --muted: #75695A;
    --accent: #8C7E68;
    --accent-dark: #6B5F4D;
    --done: #A8A092;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "Helvetica Neue", "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    min-height: 100vh;
  }

  /* ============ APP CHROME ============ */
  .app-header {
    background: var(--ivory);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .app-title {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 20px;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }
  .app-tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .nav {
    display: flex;
    gap: 4px;
    background: var(--tile-bg);
    padding: 4px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .nav button {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav button.active { background: var(--text); color: var(--ivory); }

  .app-main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }

  /* ============ CARDS ============ */
  .card {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .card-subtitle {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 18px;
  }

  /* ============ FORM ELEMENTS ============ */
  label.field {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="date"], input[type="text"], input[type="number"], textarea {
    width: 100%;
    background: var(--tile-bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s, background 0.15s;
  }
  input[type="date"]:focus, input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--ivory);
  }
  textarea { min-height: 130px; resize: vertical; line-height: 1.5; }
  .field-row { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-end; }
  .field-row > div { flex: 1; }
  .field-row > div.narrow { flex: 0 0 200px; }

  /* ============ BUTTONS ============ */
  .btn {
    background: var(--text);
    color: var(--ivory);
    border: none;
    padding: 12px 22px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 6px rgba(45, 42, 38, 0.12);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: var(--accent-dark); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: var(--tile-bg);
    color: var(--text);
    box-shadow: none;
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--tile-bg-soft); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    box-shadow: none;
    padding: 8px 14px;
  }
  .btn-ghost:hover { color: var(--text); background: var(--tile-bg-soft); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ============ STANDING DUTIES EDITOR ============ */
  .duties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 720px) { .duties-grid { grid-template-columns: 1fr; } }
  .duty-col {
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .duty-col-title {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 16px;
    text-align: center;
    padding-bottom: 8px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--divider);
  }
  .duty-section { margin-bottom: 12px; }
  .duty-section-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    padding-bottom: 2px;
    border-bottom: 0.5px solid var(--divider);
  }
  .duty-section-head input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 4px 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text);
    border-radius: 3px;
    min-width: 0;
  }
  .duty-section-head input:hover { background: rgba(255,255,255,0.4); }
  .duty-section-head input:focus { background: var(--ivory); outline: 1px solid var(--accent); }
  .duty-tasks { list-style: none; padding-left: 4px; }
  .duty-tasks li { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .duty-tasks li::before {
    content: "";
    width: 5px;
    height: 5px;
    border: 0.75px solid var(--accent);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .duty-tasks input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 4px 6px;
    font-size: 13px;
    color: var(--text);
    border-radius: 3px;
    min-width: 0;
  }
  .duty-tasks input:hover { background: rgba(255,255,255,0.4); }
  .duty-tasks input:focus { background: var(--ivory); outline: 1px solid var(--accent); }
  .ic-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    border-radius: 3px;
    opacity: 0.45;
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .ic-btn:hover { opacity: 1; background: rgba(45,42,38,0.06); color: var(--text); }
  .add-line {
    display: block;
    width: 100%;
    margin-top: 6px;
    padding: 8px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    -webkit-tap-highlight-color: transparent;
  }
  .add-line:hover { color: var(--text); background: var(--tile-bg-soft); border-color: var(--accent); border-style: solid; }
  .add-section-btn { margin-top: 12px; padding: 10px; }

  /* ============ STATUS / LOADING ============ */
  .status { text-align: center; padding: 30px 20px; color: var(--muted); }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #F4E8E0;
    border: 1px solid #C9A899;
    color: #6B3F2C;
    padding: 12px 14px;
    border-radius: 6px;
    margin-top: 12px;
    font-size: 13px;
    word-break: break-word;
  }
  .error-box details { margin-top: 6px; }
  .error-box summary { cursor: pointer; font-size: 11px; opacity: 0.8; }
  .error-box pre {
    margin-top: 6px;
    padding: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow: auto;
  }
  .config-warning {
    background: #FFF4D6;
    border: 1px solid #E8C97A;
    color: #6B5424;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.6;
  }
  .config-warning strong { display: block; margin-bottom: 4px; font-size: 14px; }
  .config-warning code { background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 3px; font-size: 12px; }

  .save-indicator {
    font-size: 11px;
    color: var(--muted);
    transition: opacity 0.3s;
    align-self: center;
  }
  .save-indicator.show { opacity: 1; }
  .save-indicator.hidden { opacity: 0; }

  /* ============ PLANS LIBRARY ============ */
  .featured-plan {
    background: var(--text);
    color: var(--ivory);
    border-radius: 12px;
    padding: 24px 26px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .featured-eyebrow {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: rgba(251, 247, 240, 0.65);
    margin-bottom: 6px;
  }
  .featured-week {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 24px;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .featured-meta {
    font-size: 11px;
    color: rgba(251, 247, 240, 0.65);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .featured-meta .pill {
    background: rgba(251, 247, 240, 0.12);
    color: var(--ivory);
    border-radius: 999px;
    padding: 2px 10px;
    font-weight: 500;
  }
  .featured-meta .pill.empty { font-style: italic; }
  .featured-open-btn {
    background: var(--ivory);
    color: var(--text);
    border: none;
    padding: 14px 26px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .featured-open-btn:hover { background: var(--bg); }
  .featured-open-btn:active { transform: scale(0.97); }

  .month-group { margin-bottom: 22px; }
  .month-head {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 18px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .month-total {
    font-size: 11px;
    color: var(--muted);
    font-weight: normal;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: 8px;
  }
  .plan-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    gap: 12px;
  }
  .plan-row-info { flex: 1; min-width: 0; }
  .plan-row-title { font-weight: 500; }
  .plan-row-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .plan-row-hours {
    font-size: 11px;
    color: var(--text);
    margin-top: 4px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .plan-row-hours .pill {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 8px;
    font-weight: 500;
    white-space: nowrap;
  }
  .plan-row-hours .pill.total { background: var(--text); color: var(--ivory); border-color: var(--text); }
  .plan-row-hours .pill.empty { color: var(--muted); font-style: italic; }
  .plan-row-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  /* ============ PRINTABLE (PLAN VIEW) ============ */
  .plan-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .plan-toolbar-left { display: flex; align-items: center; gap: 8px; }
  .plan-toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* Overflow menu (dropdown) */
  .menu-wrap { position: relative; }
  .menu-trigger {
    background: var(--tile-bg);
    color: var(--text);
    border: 1px solid var(--border);
    width: 40px;
    height: 40px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-trigger:hover { background: var(--tile-bg-soft); }
  .menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(45, 42, 38, 0.18);
    min-width: 200px;
    overflow: hidden;
    z-index: 60;
    display: none;
  }
  .menu.open { display: block; }
  .menu button {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    text-align: left;
    padding: 11px 16px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    -webkit-tap-highlight-color: transparent;
  }
  .menu button:hover { background: var(--tile-bg-soft); }
  .menu button.danger { color: #8B4332; }
  .menu .menu-divider { border-top: 1px solid var(--divider); }

  .printable-wrap {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.45in 0.5in;
    margin: 0 auto;
    max-width: 8.5in;
  }

  .pp-title-block {
    text-align: center;
    padding-bottom: 0.16in;
    margin-bottom: 0.18in;
    border-bottom: 1px solid var(--border);
  }
  .pp-title {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 22pt;
    letter-spacing: 0.06em;
  }
  .pp-eyebrow {
    font-size: 7.5pt;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 6pt;
  }

  .pp-tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.22in;
    margin-bottom: 0.22in;
  }
  .pp-tile, .pp-extras {
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.2in 0.22in 0.18in;
    page-break-inside: avoid;
    break-inside: avoid;
    min-width: 0;
  }
  .pp-tile { display: flex; flex-direction: column; }
  .pp-tile-header {
    text-align: center;
    padding-bottom: 0.1in;
    margin-bottom: 0.12in;
    border-bottom: 1px solid var(--divider);
  }
  .pp-tile-heading {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 15pt;
    letter-spacing: 0.05em;
  }
  .pp-tile-subtitle {
    font-size: 7.5pt;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.24em;
    margin-top: 4pt;
  }

  /* ============ HOURS WORKED ============ */
  .pp-hours {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6pt;
    margin-top: 5pt;
    padding-top: 4pt;
    border-top: 0.5px solid var(--divider);
  }
  .pp-hours-label {
    font-size: 7pt;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    font-weight: 600;
  }
  .pp-hours-input {
    width: 50pt;
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2pt 5pt;
    font-family: inherit;
    font-size: 9pt;
    color: var(--text);
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
    -moz-appearance: textfield;
  }
  .pp-hours-input::-webkit-outer-spin-button,
  .pp-hours-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .pp-hours-input:focus { outline: none; border-color: var(--accent); }
  .pp-hours-print { display: none; }
  .pp-hours-units { font-size: 8pt; color: var(--muted); }

  .pp-section { margin-bottom: 0.09in; }
  .pp-sec-head-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 6pt;
    margin-bottom: 3pt;
    padding-bottom: 1.5pt;
    border-bottom: 0.5px solid var(--divider);
  }
  .pp-sec-heading {
    font-size: 8pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    flex: 1;
    min-width: 0;
    line-height: 1.2;
  }

  /* ============ TASK ROWS WITH CHECKBOXES ============ */
  .pp-tasks { list-style: none; padding-left: 1pt; }
  .pp-tasks li {
    display: flex;
    align-items: flex-start;
    gap: 5pt;
    padding-right: 14pt;
    font-size: 8.75pt;
    line-height: 1.42;
    margin-bottom: 0.5pt;
    position: relative;
  }
  .pp-extras-list { list-style: none; columns: 2; column-gap: 0.35in; margin-top: 0.04in; margin-bottom: 0.04in; }
  .pp-extras-list li {
    display: flex;
    align-items: flex-start;
    gap: 5pt;
    padding-right: 14pt;
    font-size: 8.75pt;
    line-height: 1.45;
    margin-bottom: 2pt;
    break-inside: avoid;
    position: relative;
  }

  .task-check {
    flex-shrink: 0;
    margin-top: 3pt;
    width: 8pt;
    height: 8pt;
    border: 0.75px solid var(--accent);
    border-radius: 1.5px;
    background: var(--ivory);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    position: relative;
    display: inline-block;
    transition: all 0.1s;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .task-check:hover { border-color: var(--text); }
  .task-check:checked {
    background: var(--text);
    border-color: var(--text);
  }
  .task-check:checked::after {
    content: "";
    position: absolute;
    left: 1.5pt;
    top: 0pt;
    width: 3pt;
    height: 5pt;
    border: solid var(--ivory);
    border-width: 0 1pt 1pt 0;
    transform: rotate(45deg);
  }
  .task-text {
    flex: 1;
    min-width: 0;
    overflow-wrap: break-word;
  }
  .pp-tasks li.done .task-text,
  .pp-extras-list li.done .task-text {
    color: var(--done);
    text-decoration: line-through;
    text-decoration-thickness: 0.5pt;
  }

  /* ============ NOTES (PLANNER + MANAGER) ============ */
  .pp-notes-block {
    margin-top: auto;
    padding-top: 0.1in;
    border-top: 1px dashed var(--border);
  }
  .pp-notes-section { margin-bottom: 0.08in; }
  .pp-notes-section:last-child { margin-bottom: 0; }
  .pp-notes-label {
    font-size: 7.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 4pt;
  }
  .pp-notes-area {
    min-height: 0.4in;
    font-size: 9pt;
    line-height: 1.5;
    background-image: linear-gradient(transparent 95%, var(--divider) 95%);
    background-size: 100% 14pt;
    background-position: 0 11pt;
  }
  .pp-tiles .pp-notes-area { min-height: 0.32in; }

<body>

<header class="app-header">
  <div>
    <div class="app-tag">Spokane &middot; Household Systems</div>
    <div class="app-title">House Manager</div>
  </div>
  <nav class="nav" id="nav">
    <button data-view="plans" class="active">Plans</button>
    <button data-view="builder">Plan Builder</button>
  </nav>
</header>

<main class="app-main" id="app-main"></main>

<script>
/* =====================================================================
   DEFAULTS
   ===================================================================== */
const DEFAULT_STANDING = {
  tuesday: [
    { heading: "Basic House Reset", tasks: ["Tidy main spaces", "Clear counters", "Reset high-traffic areas"] },
    { heading: "Laundry System (Poplin Day)", tasks: ["Gather kids laundry (upstairs + laundry room)", "Order Poplin pickup", "Place bags outside per instructions"] },
    { heading: "Kitchen + Food Reset", tasks: ["Check and start dishwasher", "Clean out fridge", "Restock pantry from backups", "Add missing or low items to grocery list"] },
    { heading: "Coffee Prep", tasks: ["Prep about 6 coffee liners with grounds"] },
    { heading: "Laundry Maintenance", tasks: ["Check dryer and fold/put away", "Wash rags and towels"] },
    { heading: "Errands", tasks: ["Take returns to UPS or post office"] }
  ],
  thursday: [
    { heading: "Basic House Reset", tasks: ["Tidy main spaces", "Clear counters", "Reset high-traffic areas"] },
    { heading: "Kitchen Reset", tasks: ["Check and start dishwasher", "Quick fridge scan (discard old items)"] },
    { heading: "Laundry Touchpoint", tasks: ["Check dryer and fold/put away", "Put away returned laundry"] },
    { heading: "Pantry Check", tasks: ["Note low items and add to grocery list"] }
  ]
};

const state = {
  view: 'plans',
  currentPlan: null,
  standing: DEFAULT_STANDING,
  plansIndex: [],
  configOk: false
};

/* =====================================================================
   SUPABASE
   ===================================================================== */
let sb = null;
function initSupabase() {
  const cfg = window.APP_CONFIG;
  if (!cfg || !cfg.SUPABASE_URL || cfg.SUPABASE_URL.startsWith('YOUR_') ||
      !cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_ANON_KEY.startsWith('YOUR_')) {
    return false;
  }
  try { sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY); return true; }
  catch (e) { console.error('Supabase init failed:', e); return false; }
}

async function loadStandingDuties() {
  const { data, error } = await sb.from('standing_duties').select('data').eq('id', 1).maybeSingle();
  if (error) { console.error('load standing', error); return null; }
  return data?.data || null;
}
async function saveStandingDuties(duties) {
  const { error } = await sb.from('standing_duties').upsert({
    id: 1, data: duties, updated_at: new Date().toISOString()
  });
  if (error) console.error('save standing', error);
}
async function loadPlansIndex() {
  const { data, error } = await sb.from('plans')
    .select('id, week_date, saved_at, data')
    .order('week_date', { ascending: false });
  if (error) { console.error('load index', error); return []; }
  return (data || []).map(r => ({
    id: r.id,
    weekDate: r.week_date,
    savedAt: r.saved_at,
    tuesdayHours: r.data?.tuesdayHours || 0,
    thursdayHours: r.data?.thursdayHours || 0
  }));
}
async function loadPlan(id) {
  const { data, error } = await sb.from('plans').select('*').eq('id', id).single();
  if (error || !data) return null;
  return { id: data.id, weekDate: data.week_date, savedAt: data.saved_at, ...data.data };
}
async function savePlan(plan) {
  const payload = {
    week_date: plan.weekDate,
    data: {
      tuesday: plan.tuesday,
      thursday: plan.thursday,
      weeklyExtras: plan.weeklyExtras,
      tuesdayHours: plan.tuesdayHours || 0,
      thursdayHours: plan.thursdayHours || 0,
      notes: plan.notes,
      createdAt: plan.createdAt
    }
  };
  if (plan.id) {
    const { data, error } = await sb.from('plans').update(payload).eq('id', plan.id).select().single();
    if (error) throw error;
    return data.id;
  } else {
    const { data, error } = await sb.from('plans').insert(payload).select().single();
    if (error) throw error;
    return data.id;
  }
}
async function deletePlan(id) { await sb.from('plans').delete().eq('id', id); }

/* =====================================================================
   AI GENERATION
   ===================================================================== */
async function generatePlan(weekDateISO, userNotes, recentPlans) {
  const response = await fetch('/api/generate-plan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      weekDate: weekDateISO,
      userNotes: userNotes || '',
      standingDuties: state.standing,
      recentPlans: (recentPlans || []).map(p => ({
        weekDate: p.weekDate,
        extras: (p.weeklyExtras?.items || []).map(it => typeof it === 'string' ? it : it.text).slice(0, 3)
      }))
    })
  });
  const rawText = await response.text();
  let data;
  try { data = JSON.parse(rawText); }
  catch {
    const err = new Error('Server returned non-JSON response');
    err.detail = rawText.slice(0, 600); throw err;
  }
  if (!response.ok) {
    const err = new Error(data.error || ('Server error ' + response.status));
    err.detail = data.detail || data.raw || data.message || JSON.stringify(data).slice(0, 600);
    throw err;
  }
  const normalizeSections = secs => (secs || []).map(s => ({
    heading: s.heading,
    tasks: (s.tasks || []).map(t => typeof t === 'string' ? { text: t, done: false } : t)
  }));
  const normalizeItems = items => (items || []).map(it => typeof it === 'string' ? { text: it, done: false } : it);
  return {
    weekDate: weekDateISO,
    notes: userNotes,
    tuesday: { subtitle: data.tuesday?.subtitle || 'Reset + Plan Day', sections: normalizeSections(data.tuesday?.sections), notes: data.tuesday?.notes || '', managerNotes: '' },
    thursday: { subtitle: data.thursday?.subtitle || 'Maintain + Prep Day', sections: normalizeSections(data.thursday?.sections), notes: data.thursday?.notes || '', managerNotes: '' },
    weeklyExtras: { items: normalizeItems(data.weeklyExtras?.items), notes: data.weeklyExtras?.notes || '', managerNotes: '' },
    tuesdayHours: 0,
    thursdayHours: 0,
    createdAt: new Date().toISOString()
  };
}

/* =====================================================================
   HELPERS
   ===================================================================== */
function fmtWeekDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function nextTuesdayISO() {
  const d = new Date();
  const day = d.getDay();
  const daysUntil = (2 - day + 7) % 7 || 7;
  d.setDate(d.getDate() + daysUntil);
  return d.toISOString().slice(0,10);
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function monthKey(iso) {
  if (!iso) return 'Unknown';
  const [y, m] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, 1);
  return dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function fmtHours(n) {
  if (!n || n === 0) return '0';
  return Number(n) % 1 === 0 ? String(n) : Number(n).toFixed(2).replace(/\.?0+$/, '');
}
function normalizePlanForEditing(p) {
  if (!p) return p;
  const fixSections = secs => (secs || []).map(s => ({
    heading: s.heading,
    tasks: (s.tasks || []).map(t => typeof t === 'string' ? { text: t, done: false } : { text: t.text || '', done: !!t.done })
  }));
  const fixItems = items => (items || []).map(it => typeof it === 'string' ? { text: it, done: false } : { text: it.text || '', done: !!it.done });
  return {
    ...p,
    tuesday: { ...p.tuesday, sections: fixSections(p.tuesday?.sections), managerNotes: p.tuesday?.managerNotes || '' },
    thursday: { ...p.thursday, sections: fixSections(p.thursday?.sections), managerNotes: p.thursday?.managerNotes || '' },
    weeklyExtras: { ...p.weeklyExtras, items: fixItems(p.weeklyExtras?.items), managerNotes: p.weeklyExtras?.managerNotes || '' },
    tuesdayHours: p.tuesdayHours || 0,
    thursdayHours: p.thursdayHours || 0
  };
}

/* =====================================================================
   VIEW: PLANS (was Library — now the default landing view)
   ===================================================================== */
function renderPlans() {
  const main = document.getElementById('app-main');
  if (!state.configOk) {
    main.innerHTML = configWarningHtml() + emptyPlansCard('Setup needed before plans can load.');
    return;
  }
  if (!state.plansIndex.length) {
    main.innerHTML = `
      <div class="card">
        <h2 class="card-title">Plans</h2>
        <div class="card-subtitle">Weekly plans, by month</div>
        <div class="empty">No plans here yet. Once a plan is created in Plan Builder, it'll show up here.</div>
      </div>`;
    return;
  }

  // Most recent plan = top of plansIndex (already sorted desc by week_date)
  const featured = state.plansIndex[0];
  const rest = state.plansIndex.slice(1);

  const featuredTotal = (featured.tuesdayHours || 0) + (featured.thursdayHours || 0);

  const groups = {};
  rest.forEach(p => {
    const k = monthKey(p.weekDate);
    (groups[k] = groups[k] || []).push(p);
  });
  const sortedKeys = Object.keys(groups).sort((a,b) => {
    const da = new Date(groups[a][0].weekDate); const db = new Date(groups[b][0].weekDate);
    return db - da;
  });

  main.innerHTML = `
    <div class="featured-plan">
      <div>
        <div class="featured-eyebrow">Most Recent Plan</div>
        <div class="featured-week">Week of ${escapeHtml(fmtWeekDate(featured.weekDate))}</div>
        <div class="featured-meta">
          ${featuredTotal > 0
            ? `<span class="pill">Tue ${fmtHours(featured.tuesdayHours)}h</span>
               <span class="pill">Thu ${fmtHours(featured.thursdayHours)}h</span>
               <span class="pill">${fmtHours(featuredTotal)}h total</span>`
            : `<span class="pill empty">No hours logged yet</span>`
          }
        </div>
      </div>
      <button class="featured-open-btn" data-action="open" data-id="${featured.id}">Open Plan</button>
    </div>

    ${rest.length > 0 ? `
      <div class="card">
        <h2 class="card-title">Past Weeks</h2>
        <div class="card-subtitle">Saved plans, by month</div>
        ${sortedKeys.map(k => {
          const monthPlans = groups[k].sort((a,b) => new Date(b.weekDate) - new Date(a.weekDate));
          const monthTotal = monthPlans.reduce((sum, p) => sum + (p.tuesdayHours||0) + (p.thursdayHours||0), 0);
          return `
            <div class="month-group">
              <div class="month-head">${escapeHtml(k)}${monthTotal > 0 ? `<span class="month-total">— ${fmtHours(monthTotal)} hrs total</span>` : ''}</div>
              ${monthPlans.map(p => planRowHtml(p)).join('')}
            </div>`;
        }).join('')}
      </div>
    ` : ''}
  `;

  main.querySelectorAll('button[data-action]').forEach(b => {
    b.addEventListener('click', async () => {
      const id = b.dataset.id;
      if (b.dataset.action === 'open') {
        const p = await loadPlan(id);
        if (p) { state.currentPlan = normalizePlanForEditing(p); switchView('plan'); }
      } else if (b.dataset.action === 'del') {
        if (!confirm('Delete this plan permanently?')) return;
        await deletePlan(id);
        state.plansIndex = await loadPlansIndex();
        renderPlans();
      }
    });
  });
}

function planRowHtml(p) {
  const tue = p.tuesdayHours || 0;
  const thu = p.thursdayHours || 0;
  const total = tue + thu;
  return `
    <div class="plan-row">
      <div class="plan-row-info">
        <div class="plan-row-title">Week of ${escapeHtml(fmtWeekDate(p.weekDate))}</div>
        <div class="plan-row-meta">Saved ${new Date(p.savedAt).toLocaleDateString()}</div>
        <div class="plan-row-hours">
          ${total > 0 ? `
            <span class="pill">Tue ${fmtHours(tue)}h</span>

let dutiesSaveTimer = null;
function debouncedSaveDuties() {
  clearTimeout(dutiesSaveTimer);
  dutiesSaveTimer = setTimeout(() => { if (state.configOk) saveStandingDuties(state.standing); }, 600);
}
async function onDutiesInput(e) {
  const t = e.target;
  if (t.tagName !== 'INPUT') return;
  const sec = t.closest('.duty-section'); if (!sec) return;
  const day = sec.dataset.day; const si = +sec.dataset.si;
  if (t.dataset.action === 'edit-heading') state.standing[day][si].heading = t.value;
  else if (t.dataset.action === 'edit-task') {
    const li = t.closest('li'); const ti = +li.dataset.ti;
    state.standing[day][si].tasks[ti] = t.value;
  }
  debouncedSaveDuties();
}
async function onDutiesClick(e) {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const sec = btn.closest('.duty-section'); if (!sec) return;
  const day = sec.dataset.day; const si = +sec.dataset.si;
  if (btn.dataset.action === 'del-section') {
    if (!confirm('Delete this section?')) return;
    state.standing[day].splice(si, 1);
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol(day);
  } else if (btn.dataset.action === 'del-task') {
    const li = btn.closest('li'); const ti = +li.dataset.ti;
    state.standing[day][si].tasks.splice(ti, 1);
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol(day);
  } else if (btn.dataset.action === 'add-task') {
    state.standing[day][si].tasks.push('New task');
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol(day);
    const cols = sec.parentElement.querySelectorAll('.duty-section');
    const lis = cols[si].querySelectorAll('.duty-tasks li');
    lis[lis.length-1]?.querySelector('input')?.focus();
  }
}
async function onAddSection(e) {
  const day = e.target.dataset.day;
  state.standing[day].push({ heading: 'New Section', tasks: ['New task'] });

async function onGenerate() {
  const weekDate = document.getElementById('week-date').value;
  const notes = document.getElementById('notes-in').value;
  const status = document.getElementById('gen-status');
  const btn = document.getElementById('gen-btn');
  if (!weekDate) { status.innerHTML = '<div class="error-box">Please pick a week date.</div>'; return; }
  btn.disabled = true;
  status.innerHTML = '<div class="status"><span class="spinner"></span> Drafting your plan…</div>';
  try {
    const recent = [];
    if (state.configOk) {
      for (const idx of state.plansIndex.slice(0, 3)) {
        const p = await loadPlan(idx.id);
        if (p) recent.push(normalizePlanForEditing(p));
      }
    }
    const plan = await generatePlan(weekDate, notes, recent);
    state.currentPlan = plan;
    switchView('plan');
  } catch (err) {
    const detail = err.detail ? `<details><summary>Show details</summary><pre>${escapeHtml(err.detail)}</pre></details>` : '';
    status.innerHTML = `<div class="error-box"><strong>${escapeHtml(err.message)}</strong>${detail}</div>`;
    btn.disabled = false;
  }
}

function onStartBlank() {
  const weekDate = document.getElementById('week-date').value || nextTuesdayISO();

    tuesday: { subtitle: 'Reset + Plan Day', sections: blankSections(state.standing.tuesday), notes: '', managerNotes: '' },
    thursday: { subtitle: 'Maintain + Prep Day', sections: blankSections(state.standing.thursday), notes: '', managerNotes: '' },

}

function sectionHtml(s) {
  return `
    <div class="pp-section">
      <div class="pp-sec-head-row">
        <div class="pp-sec-heading" contenteditable="true">${escapeHtml(s.heading)}</div>
        <button class="ctrl ctrl-sec-x" onclick="delSection(this)">&times;</button>
      </div>
      <ul class="pp-tasks">
        ${(s.tasks||[]).map((t, i) => taskItemHtml(t, i)).join('')}
      </ul>
      <button class="ctrl ctrl-add-task" onclick="addTask(this)">+ task</button>
    </div>
  `;
}
function taskItemHtml(t) {
  const text = typeof t === 'string' ? t : (t.text || '');
  const done = typeof t === 'object' && t.done;
  return `<li class="${done ? 'done' : ''}">
    <input type="checkbox" class="task-check" ${done ? 'checked' : ''} aria-label="Mark task complete" />
    <span class="task-text" contenteditable="true">${escapeHtml(text)}</span>
    <button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button>
  </li>`;
}
function extraItemHtml(t) {
  const text = typeof t === 'string' ? t : (t.text || '');
  const done = typeof t === 'object' && t.done;
  return `<li class="${done ? 'done' : ''}">
    <input type="checkbox" class="task-check" ${done ? 'checked' : ''} aria-label="Mark item complete" />
    <span class="task-text" contenteditable="true">${escapeHtml(text)}</span>
    <button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button>
  </li>`;
}

window.delSection = btn => { btn.closest('.pp-section').remove(); scheduleAutoSave(); };
window.delTask = btn => { btn.closest('li').remove(); scheduleAutoSave(); };
window.addTask = btn => {
  const ul = btn.previousElementSibling;
  const li = document.createElement('li');
  li.innerHTML = `<input type="checkbox" class="task-check" aria-label="Mark task complete" />
    <span class="task-text" contenteditable="true">New task</span>
    <button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button>`;
  ul.appendChild(li); selectAll(li.querySelector('.task-text')); scheduleAutoSave();
};
window.addExtra = btn => {
  const ul = btn.previousElementSibling;
  const li = document.createElement('li');
  li.innerHTML = `<input type="checkbox" class="task-check" aria-label="Mark item complete" />
    <span class="task-text" contenteditable="true">New item</span>
    <button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button>`;
  ul.appendChild(li); selectAll(li.querySelector('.task-text')); scheduleAutoSave();
};
window.addSection = btn => {
  const sec = document.createElement('div');
  sec.className = 'pp-section';
  sec.innerHTML = `
    <div class="pp-sec-head-row">
      <div class="pp-sec-heading" contenteditable="true">New Section</div>
      <button class="ctrl ctrl-sec-x" onclick="delSection(this)">&times;</button>
    </div>
    <ul class="pp-tasks">
      <li><input type="checkbox" class="task-check" />
        <span class="task-text" contenteditable="true">New task</span>
        <button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button></li>
    </ul>
    <button class="ctrl ctrl-add-task" onclick="addTask(this)">+ task</button>
  `;
  btn.parentNode.insertBefore(sec, btn);
  selectAll(sec.querySelector('.pp-sec-heading')); scheduleAutoSave();
};
function selectAll(el) {
  el.focus();
  const r = document.createRange();
  r.selectNodeContents(el);
  const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
}

function onPlanInput() { scheduleAutoSave(); }
function onPlanChange(e) {
  if (e.target.classList && e.target.classList.contains('task-check')) {
    const li = e.target.closest('li');
    li.classList.toggle('done', e.target.checked);
    scheduleAutoSave();
  }
}
function onPlanClick(e) {
  if (e.target.classList && e.target.classList.contains('task-check')) {
    e.stopPropagation();
  }
}

let autoSaveTimer = null;
function scheduleAutoSave() {
  if (!state.configOk) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => onSavePlan(false), 700);
}

function readCurrentPlanFromDom() {
  const printable = document.getElementById('printable');
  const readTile = (sel) => {
    const tile = printable.querySelector(sel);
    const subtitle = tile.querySelector('[data-field="subtitle"]')?.innerText.trim() || '';
    const sections = Array.from(tile.querySelectorAll('.pp-section')).map(sec => ({
      heading: sec.querySelector('.pp-sec-heading')?.innerText.trim() || '',
      tasks: Array.from(sec.querySelectorAll('.pp-tasks li')).map(li => ({
        text: li.querySelector('.task-text')?.innerText.trim() || '',
        done: !!li.querySelector('.task-check')?.checked
      })).filter(t => t.text)
    }));
    const notes = tile.querySelector('[data-field="notes"]')?.innerText.trim() || '';
    const managerNotes = tile.querySelector('[data-field="managerNotes"]')?.innerText.trim() || '';
    return { subtitle, sections, notes, managerNotes };
  };
  const extras = printable.querySelector('.pp-extras');
  const extrasItems = Array.from(extras.querySelectorAll('.pp-extras-list li')).map(li => ({
    text: li.querySelector('.task-text')?.innerText.trim() || '',
    done: !!li.querySelector('.task-check')?.checked
  })).filter(t => t.text);
  const extrasNotes = extras.querySelector('[data-field="notes"]')?.innerText.trim() || '';
  const extrasManagerNotes = extras.querySelector('[data-field="managerNotes"]')?.innerText.trim() || '';
  const tuesdayHours = parseFloat(printable.querySelector('[data-hours="tuesdayHours"]')?.value) || 0;
  const thursdayHours = parseFloat(printable.querySelector('[data-hours="thursdayHours"]')?.value) || 0;

  return {
    ...state.currentPlan,
    tuesday: readTile('[data-tile="tuesday"]'),
    thursday: readTile('[data-tile="thursday"]'),
    weeklyExtras: { items: extrasItems, notes: extrasNotes, managerNotes: extrasManagerNotes },
    tuesdayHours, thursdayHours
  };
}

async function onSavePlan(explicit) {
  if (!state.configOk) return;
  const updated = readCurrentPlanFromDom();
  const btn = document.getElementById('save-btn');
  const indicator = document.getElementById('save-indicator');
  const wasNew = !state.currentPlan?.id;
  if (explicit) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const id = await savePlan(updated);
    updated.id = id;
    state.currentPlan = updated;
    state.plansIndex = await loadPlansIndex();
    if (explicit) {
      btn.textContent = 'Saved ✓';
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Update'; }, 1600);
    } else if (indicator) {
      indicator.classList.remove('hidden'); indicator.classList.add('show');
      setTimeout(() => { indicator.classList.remove('show'); indicator.classList.add('hidden'); }, 1400);
    }
    // First save promotes plan from new → saved, so re-render to show Copy/Delete in menu
    if (wasNew) renderPlan();
  } catch (e) {
    if (explicit) { btn.disabled = false; btn.textContent = 'Save failed — retry'; }
    console.error('save plan error', e);
  }
}

async function onCopyToNewWeek() {
  const current = state.currentPlan;
  if (!current) return;
  const proposedDefault = (() => {
    const [y,m,d] = current.weekDate.split('-').map(Number);
    const dt = new Date(y, m-1, d); dt.setDate(dt.getDate() + 7);
    return dt.toISOString().slice(0,10);
  })();
  const newDate = prompt('Copy this plan to a new week. Pick a date (YYYY-MM-DD):', proposedDefault);
  if (!newDate) return;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) { alert('Please use YYYY-MM-DD format.'); return; }

  const stripDone = sections => (sections || []).map(s => ({
    heading: s.heading,
    tasks: (s.tasks || []).map(t => ({ text: typeof t === 'string' ? t : t.text, done: false }))
  }));
  const stripExtras = items => (items || []).map(it => ({ text: typeof it === 'string' ? it : it.text, done: false }));
  const fresh = {
    weekDate: newDate,
    notes: current.notes || '',
    tuesday: { subtitle: current.tuesday?.subtitle, sections: stripDone(current.tuesday?.sections), notes: current.tuesday?.notes || '', managerNotes: '' },
    thursday: { subtitle: current.thursday?.subtitle, sections: stripDone(current.thursday?.sections), notes: current.thursday?.notes || '', managerNotes: '' },
    weeklyExtras: { items: stripExtras(current.weeklyExtras?.items), notes: current.weeklyExtras?.notes || '', managerNotes: '' },
    tuesdayHours: 0, thursdayHours: 0,
    createdAt: new Date().toISOString()
  };
  try {
    const id = await savePlan(fresh);
    fresh.id = id;
    state.currentPlan = fresh;
    state.plansIndex = await loadPlansIndex();
    renderPlan();
  } catch (e) {
    alert('Copy failed — see console for details.');
    console.error(e);
  }
}

async function onResetChecks() {
  if (!confirm('Uncheck all tasks and clear the hours? (Manager notes will be kept.)')) return;
  const printable = document.getElementById('printable');
  printable.querySelectorAll('.task-check').forEach(cb => {
    cb.checked = false;
    cb.closest('li').classList.remove('done');
  });
  printable.querySelectorAll('.pp-hours-input').forEach(inp => { inp.value = ''; });
  scheduleAutoSave();
}

async function onDeleteCurrent() {
  const p = state.currentPlan;
  if (!p?.id) return;
  if (!confirm(`Delete the plan for week of ${fmtWeekDate(p.weekDate)} permanently?`)) return;
  await deletePlan(p.id);
  state.plansIndex = await loadPlansIndex();
  state.currentPlan = null;
  switchView('plans');
}

/* =====================================================================
   VIEW SWITCHING + INIT
   ===================================================================== */
function switchView(v) {
  state.view = v;
  document.querySelectorAll('#nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v || (v === 'plan' && b.dataset.view === 'plans'));
  });
  if (v === 'plans') renderPlans();
  else if (v === 'builder') renderBuilder();
  else if (v === 'plan') renderPlan();
  window.scrollTo(0, 0);
}
document.getElementById('nav').addEventListener('click', e => {
  const b = e.target.closest('button[data-view]');
  if (b) switchView(b.dataset.view);
});

(async () => {
  state.configOk = initSupabase();
  if (state.configOk) {
    try {
      const loaded = await loadStandingDuties();
      if (loaded) state.standing = loaded;
      else await saveStandingDuties(DEFAULT_STANDING);
      state.plansIndex = await loadPlansIndex();
    } catch (e) { console.error('Initial load error:', e); }
  }
  switchView('plans');
})();
</script>
