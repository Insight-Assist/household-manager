<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>House Manager</title>

<!-- Local config (gitignored). On Netlify this is auto-generated from env vars at build time.
     Locally, copy config.example.js → config.js and fill in your Supabase values. -->
<script src="config.js" onerror="window.__CONFIG_MISSING=true"></script>

<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @page { size: letter portrait; margin: 0.35in; }

  :root {
    --ivory: #FBF7F0;
    --bg: #E6E0D4;
    --tile-bg: #F1ECE2;
    --tile-bg-soft: #F5F1E8;
    --border: #D8D2C5;
    --divider: #E5DFD3;
    --text: #2D2A26;
    --muted: #75695A;
    --accent: #8C7E68;
    --accent-dark: #6B5F4D;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "Helvetica Neue", "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
    min-height: 100vh;
  }

  /* ============ APP CHROME ============ */
  .app-header {
    background: var(--ivory);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .app-title {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 20px;
    letter-spacing: 0.04em;
  }
  .app-tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .nav {
    display: flex;
    gap: 4px;
    background: var(--tile-bg);
    padding: 4px;
    border-radius: 999px;
  }
  .nav button {
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: all 0.15s;
  }
  .nav button.active { background: var(--text); color: var(--ivory); }

  .app-main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }

  /* ============ CARDS ============ */
  .card {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .card-subtitle {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 18px;
  }

  /* ============ FORM ELEMENTS ============ */
  label.field {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="date"], input[type="text"], textarea {
    width: 100%;
    background: var(--tile-bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    -webkit-appearance: none;
    appearance: none;
    transition: border-color 0.15s, background 0.15s;
  }
  input[type="date"]:focus, input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--ivory);
  }
  textarea { min-height: 130px; resize: vertical; line-height: 1.5; }
  .field-row { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-end; }
  .field-row > div { flex: 1; }
  .field-row > div.narrow { flex: 0 0 200px; }

  /* ============ BUTTONS ============ */
  .btn {
    background: var(--text);
    color: var(--ivory);
    border: none;
    padding: 12px 22px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 6px rgba(45, 42, 38, 0.12);
  }
  .btn:hover { background: var(--accent-dark); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: var(--tile-bg);
    color: var(--text);
    box-shadow: none;
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--tile-bg-soft); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    box-shadow: none;
    padding: 8px 14px;
  }
  .btn-ghost:hover { color: var(--text); background: var(--tile-bg-soft); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* ============ STANDING DUTIES EDITOR ============ */
  .duties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 720px) { .duties-grid { grid-template-columns: 1fr; } }
  .duty-col {
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .duty-col-title {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 16px;
    text-align: center;
    padding-bottom: 8px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--divider);
  }
  .duty-section { margin-bottom: 10px; }
  .duty-section-head {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    padding-bottom: 2px;
    border-bottom: 0.5px solid var(--divider);
  }
  .duty-section-head input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 3px 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text);
    border-radius: 3px;
  }
  .duty-section-head input:hover { background: rgba(255,255,255,0.4); }
  .duty-section-head input:focus { background: var(--ivory); outline: 1px solid var(--accent); }
  .duty-tasks { list-style: none; padding-left: 4px; }
  .duty-tasks li { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
  .duty-tasks li::before {
    content: "";
    width: 5px;
    height: 5px;
    border: 0.75px solid var(--accent);
    border-radius: 1px;
    flex-shrink: 0;
  }
  .duty-tasks input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 3px 4px;
    font-size: 12px;
    color: var(--text);
    border-radius: 3px;
  }
  .duty-tasks input:hover { background: rgba(255,255,255,0.4); }
  .duty-tasks input:focus { background: var(--ivory); outline: 1px solid var(--accent); }
  .ic-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    border-radius: 3px;
    opacity: 0.4;
    -webkit-appearance: none;
    appearance: none;
    flex-shrink: 0;
  }
  .ic-btn:hover { opacity: 1; background: rgba(45,42,38,0.06); color: var(--text); }
  .add-line {
    display: block;
    width: 100%;
    margin-top: 4px;
    padding: 5px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
  .add-line:hover { color: var(--text); background: var(--tile-bg-soft); border-color: var(--accent); border-style: solid; }
  .add-section-btn { margin-top: 10px; padding: 8px; font-size: 10px; }

  /* ============ STATUS / LOADING ============ */
  .status { text-align: center; padding: 30px 20px; color: var(--muted); }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #F4E8E0;
    border: 1px solid #C9A899;
    color: #6B3F2C;
    padding: 12px 14px;
    border-radius: 6px;
    margin-top: 12px;
    font-size: 13px;
    word-break: break-word;
  }
  .error-box details { margin-top: 6px; }
  .error-box summary { cursor: pointer; font-size: 11px; opacity: 0.8; }
  .error-box pre {
    margin-top: 6px;
    padding: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow: auto;
  }
  .config-warning {
    background: #FFF4D6;
    border: 1px solid #E8C97A;
    color: #6B5424;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.6;
  }
  .config-warning strong { display: block; margin-bottom: 4px; font-size: 14px; }
  .config-warning code { background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 3px; font-size: 12px; }

  /* ============ LIBRARY ============ */
  .month-group { margin-bottom: 22px; }
  .month-head {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 18px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .plan-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    gap: 12px;
  }
  .plan-row-title { font-weight: 500; }
  .plan-row-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .plan-row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  /* ============ PRINTABLE (PLAN VIEW) ============ */
  .plan-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .printable-wrap {
    background: var(--ivory);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.45in 0.5in;
    margin: 0 auto;
    max-width: 8.5in;
  }

  .pp-title-block {
    text-align: center;
    padding-bottom: 0.16in;
    margin-bottom: 0.18in;
    border-bottom: 1px solid var(--border);
  }
  .pp-title {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 22pt;
    letter-spacing: 0.06em;
  }
  .pp-eyebrow {
    font-size: 7.5pt;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-bottom: 6pt;
  }

  .pp-tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.22in;
    margin-bottom: 0.22in;
  }
  .pp-tile, .pp-extras {
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.2in 0.22in 0.18in;
    page-break-inside: avoid;
    break-inside: avoid;
    min-width: 0;
  }
  .pp-tile { display: flex; flex-direction: column; }
  .pp-tile-header {
    text-align: center;
    padding-bottom: 0.1in;
    margin-bottom: 0.12in;
    border-bottom: 1px solid var(--divider);
  }
  .pp-tile-heading {
    font-family: "Iowan Old Style", Georgia, serif;
    font-size: 15pt;
    letter-spacing: 0.05em;
  }
  .pp-tile-subtitle {
    font-size: 7.5pt;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.24em;
    margin-top: 4pt;
  }
  .pp-section { margin-bottom: 0.09in; }
  .pp-sec-head-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 6pt;
    margin-bottom: 3pt;
    padding-bottom: 1.5pt;
    border-bottom: 0.5px solid var(--divider);
  }
  .pp-sec-heading {
    font-size: 8pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    flex: 1;
    min-width: 0;
    line-height: 1.2;
  }
  .pp-tasks { list-style: none; padding-left: 1pt; }
  .pp-tasks li {
    position: relative;
    padding-left: 12pt;
    padding-right: 14pt;
    font-size: 8.75pt;
    line-height: 1.42;
    margin-bottom: 0.5pt;
  }
  .pp-tasks li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 4.5pt;
    width: 5pt;
    height: 5pt;
    border: 0.75px solid var(--accent);
    border-radius: 1px;
    background: var(--ivory);
  }

  .pp-notes {
    margin-top: auto;
    padding-top: 0.1in;
    border-top: 1px dashed var(--border);
  }
  .pp-notes-label {
    font-size: 7.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 4pt;
  }
  .pp-notes-area {
    min-height: 0.45in;
    font-size: 9pt;
    line-height: 1.5;
    background-image: linear-gradient(transparent 95%, var(--divider) 95%);
    background-size: 100% 14pt;
    background-position: 0 11pt;
  }
  .pp-tiles .pp-notes-area { min-height: 0.4in; }
  .pp-extras .pp-tile-header { margin-bottom: 0.1in; }
  .pp-extras-list {
    list-style: none;
    columns: 2;
    column-gap: 0.35in;
    margin-top: 0.04in;
    margin-bottom: 0.04in;
  }
  .pp-extras-list li {
    position: relative;
    padding-left: 12pt;
    padding-right: 14pt;
    font-size: 8.75pt;
    line-height: 1.45;
    margin-bottom: 2pt;
    break-inside: avoid;
  }
  .pp-extras-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 4.5pt;
    width: 5pt;
    height: 5pt;
    border: 0.75px solid var(--accent);
    border-radius: 1px;
    background: var(--ivory);
  }
  .pp-extras .pp-notes { margin-top: 0.08in; padding-top: 0.08in; }
  .pp-extras .pp-notes-area { min-height: 0.35in; }

  [contenteditable="true"] {
    cursor: text;
    transition: background-color 0.15s;
    border-radius: 2px;
    -webkit-user-select: text;
    user-select: text;
    overflow-wrap: break-word;
  }
  [contenteditable="true"]:hover { background: rgba(255,255,255,0.4); }
  [contenteditable="true"]:focus {
    outline: 1.5px solid rgba(140,126,104,0.45);
    outline-offset: 2px;
    background: rgba(255,255,255,0.55);
  }

  .ctrl {
    font-family: inherit;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    transition: all 0.15s;
  }
  .ctrl-sec-x {
    font-size: 13pt;
    line-height: 1;
    width: 14pt;
    height: 14pt;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0;
    margin-bottom: -1pt;
  }
  .pp-sec-head-row:hover .ctrl-sec-x { opacity: 0.45; }
  .ctrl-sec-x:hover { opacity: 1 !important; background: rgba(45,42,38,0.06); color: var(--text); }
  .ctrl-task-x {
    position: absolute;
    right: 0;
    top: 1.5pt;
    width: 12pt;
    height: 12pt;
    font-size: 11pt;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }
  .pp-tasks li:hover .ctrl-task-x,
  .pp-extras-list li:hover .ctrl-task-x { opacity: 0.4; }
  .ctrl-task-x:hover { opacity: 1 !important; background: rgba(45,42,38,0.06); color: var(--text); }
  .ctrl-add-task {
    display: inline-block;
    margin-left: 12pt;
    margin-top: 2pt;
    padding: 1pt 5pt;
    font-size: 7pt;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    opacity: 0.55;
  }
  .ctrl-add-task:hover { opacity: 1; color: var(--accent); }
  .ctrl-add-section {
    display: block;
    width: 100%;
    margin-top: 6pt;
    padding: 4pt 6pt;
    border: 1px dashed var(--border);
    font-size: 7pt;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    opacity: 0.7;
  }
  .ctrl-add-section:hover { opacity: 1; border-color: var(--accent); border-style: solid; color: var(--text); background: var(--tile-bg-soft); }

  /* ============ MOBILE ============ */
  @media screen and (max-width: 820px) {
    .pp-tiles { grid-template-columns: 1fr; gap: 14px; }
    .pp-extras-list { columns: 1; }
    .printable-wrap { padding: 18px 14px; }
    .pp-title { font-size: 22pt; }
    .pp-tile, .pp-extras { padding: 14px; }
    .pp-tasks li, .pp-extras-list li { font-size: 14px; padding-left: 16px; padding-right: 30px; line-height: 1.4; margin-bottom: 4px; }
    .pp-sec-heading { font-size: 11px; letter-spacing: 0.12em; }
    .pp-tile-heading { font-size: 18pt; }
    .pp-notes-area { min-height: 60px; font-size: 14px; background-size: 100% 22px; background-position: 0 18px; }
    .ctrl-sec-x { opacity: 0.55; width: 28px; height: 28px; font-size: 18px; margin-bottom: 0; }
    .ctrl-task-x { opacity: 0.4; width: 26px; height: 26px; font-size: 16px; top: -2px; }
    .ctrl-add-task { padding: 6px 10px; font-size: 10px; border: 1px dashed var(--border); border-radius: 4px; margin-left: 0; margin-top: 6px; opacity: 0.85; }
    .field-row { flex-direction: column; align-items: stretch; }
    .field-row > div.narrow { flex: 1; }
  }

  /* ============ PRINT ============ */
  @media print {
    html, body { background: white; font-size: 9pt; }
    .app-header, .nav, .plan-toolbar, .ctrl, .ctrl-sec-x, .ctrl-task-x, .ctrl-add-task, .ctrl-add-section, .config-warning { display: none !important; }
    .app-main { padding: 0 !important; max-width: none !important; }
    .printable-wrap { padding: 0 !important; margin: 0 !important; max-width: none !important; border: none !important; background: white !important; }
    .pp-tiles { grid-template-columns: 1fr 1fr !important; gap: 0.16in !important; margin-bottom: 0.14in !important; }
    .pp-extras-list { columns: 2 !important; column-gap: 0.3in !important; }
    .pp-tile, .pp-extras {
      background: var(--tile-bg) !important;
      padding: 0.15in 0.18in 0.13in !important;
      border-radius: 4px !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .pp-extras { padding: 0.15in 0.2in 0.13in !important; }
    .pp-title-block { padding-bottom: 0.1in !important; margin-bottom: 0.12in !important; }
    .pp-title { font-size: 19pt !important; }
    .pp-eyebrow { font-size: 6.5pt !important; margin-bottom: 4pt !important; }
    .pp-tile-header { padding-bottom: 0.06in !important; margin-bottom: 0.08in !important; }
    .pp-extras .pp-tile-header { margin-bottom: 0.07in !important; }
    .pp-tile-heading { font-size: 13pt !important; }
    .pp-tile-subtitle { font-size: 6.5pt !important; margin-top: 3pt !important; }
    .pp-section { margin-bottom: 0.06in !important; }
    .pp-sec-head-row { margin-bottom: 2pt !important; padding-bottom: 1pt !important; }
    .pp-sec-heading { font-size: 7.5pt !important; letter-spacing: 0.1em !important; }
    .pp-tasks li, .pp-extras-list li {
      font-size: 8.25pt !important; line-height: 1.32 !important;
      padding-left: 11pt !important; padding-right: 0 !important; margin-bottom: 0 !important;
    }
    .pp-tasks li::before, .pp-extras-list li::before { top: 4pt !important; width: 4.5pt !important; height: 4.5pt !important; }
    .pp-notes { padding-top: 0.06in !important; }
    .pp-extras .pp-notes { padding-top: 0.06in !important; margin-top: 0.05in !important; }
    .pp-notes-label { font-size: 6.5pt !important; margin-bottom: 2pt !important; }
    .pp-tiles .pp-notes-area { min-height: 0.28in !important; font-size: 8pt !important; background-size: 100% 12pt !important; background-position: 0 9pt !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .pp-extras .pp-notes-area { min-height: 0.22in !important; font-size: 8pt !important; background-size: 100% 12pt !important; background-position: 0 9pt !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    [contenteditable="true"]:hover, [contenteditable="true"]:focus { outline: none !important; background: transparent !important; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-tag">Spokane &middot; Household Systems</div>
    <div class="app-title">House Manager</div>
  </div>
  <nav class="nav" id="nav">
    <button data-view="dashboard" class="active">Dashboard</button>
    <button data-view="library">Library</button>
  </nav>
</header>

<main class="app-main" id="app-main"></main>

<script>
/* =====================================================================
   DEFAULT STANDING DUTIES (used on first run / reset)
   ===================================================================== */
const DEFAULT_STANDING = {
  tuesday: [
    { heading: "Basic House Reset", tasks: ["Tidy main spaces", "Clear counters", "Reset high-traffic areas"] },
    { heading: "Laundry System (Poplin Day)", tasks: ["Gather kids laundry (upstairs + laundry room)", "Order Poplin pickup", "Place bags outside per instructions"] },
    { heading: "Kitchen + Food Reset", tasks: ["Check and start dishwasher", "Clean out fridge", "Restock pantry from backups", "Add missing or low items to grocery list"] },
    { heading: "Coffee Prep", tasks: ["Prep about 6 coffee liners with grounds"] },
    { heading: "Laundry Maintenance", tasks: ["Check dryer and fold/put away", "Wash rags and towels"] },
    { heading: "Errands", tasks: ["Take returns to UPS or post office"] }
  ],
  thursday: [
    { heading: "Basic House Reset", tasks: ["Tidy main spaces", "Clear counters", "Reset high-traffic areas"] },
    { heading: "Kitchen Reset", tasks: ["Check and start dishwasher", "Quick fridge scan (discard old items)"] },
    { heading: "Laundry Touchpoint", tasks: ["Check dryer and fold/put away", "Put away returned laundry"] },
    { heading: "Pantry Check", tasks: ["Note low items and add to grocery list"] }
  ]
};

const state = {
  view: 'dashboard',
  currentPlan: null,
  standing: DEFAULT_STANDING,
  plansIndex: [],
  configOk: false
};

/* =====================================================================
   SUPABASE CLIENT
   ===================================================================== */
let sb = null;
function initSupabase() {
  const cfg = window.APP_CONFIG;
  if (!cfg || !cfg.SUPABASE_URL || cfg.SUPABASE_URL.startsWith('YOUR_') ||
      !cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_ANON_KEY.startsWith('YOUR_')) {
    return false;
  }
  try {
    sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    return true;
  } catch (e) {
    console.error('Supabase init failed:', e);
    return false;
  }
}

/* =====================================================================
   STORAGE LAYER (Supabase)
   ===================================================================== */
async function loadStandingDuties() {
  const { data, error } = await sb.from('standing_duties').select('data').eq('id', 1).maybeSingle();
  if (error) { console.error('load standing', error); return null; }
  return data?.data || null;
}
async function saveStandingDuties(duties) {
  const { error } = await sb.from('standing_duties').upsert({
    id: 1, data: duties, updated_at: new Date().toISOString()
  });
  if (error) console.error('save standing', error);
}
async function loadPlansIndex() {
  const { data, error } = await sb.from('plans')
    .select('id, week_date, saved_at')
    .order('week_date', { ascending: false });
  if (error) { console.error('load index', error); return []; }
  return (data || []).map(r => ({ id: r.id, weekDate: r.week_date, savedAt: r.saved_at }));
}
async function loadPlan(id) {
  const { data, error } = await sb.from('plans').select('*').eq('id', id).single();
  if (error || !data) return null;
  return {
    id: data.id,
    weekDate: data.week_date,
    savedAt: data.saved_at,
    ...data.data
  };
}
async function savePlan(plan) {
  const payload = {
    week_date: plan.weekDate,
    data: {
      tuesday: plan.tuesday,
      thursday: plan.thursday,
      weeklyExtras: plan.weeklyExtras,
      notes: plan.notes,
      createdAt: plan.createdAt
    }
  };
  if (plan.id) {
    const { data, error } = await sb.from('plans').update(payload).eq('id', plan.id).select().single();
    if (error) throw error;
    return data.id;
  } else {
    const { data, error } = await sb.from('plans').insert(payload).select().single();
    if (error) throw error;
    return data.id;
  }
}
async function deletePlan(id) {
  await sb.from('plans').delete().eq('id', id);
}

/* =====================================================================
   AI GENERATION (via Netlify Function)
   ===================================================================== */
async function generatePlan(weekDateISO, userNotes, recentPlans) {
  const response = await fetch('/api/generate-plan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      weekDate: weekDateISO,
      userNotes: userNotes || '',
      standingDuties: state.standing,
      recentPlans: (recentPlans || []).map(p => ({
        weekDate: p.weekDate,
        extras: (p.weeklyExtras?.items || []).slice(0, 3)
      }))
    })
  });

  const rawText = await response.text();
  let data;
  try { data = JSON.parse(rawText); }
  catch {
    const err = new Error('Server returned non-JSON response');
    err.detail = rawText.slice(0, 600);
    throw err;
  }
  if (!response.ok) {
    const err = new Error(data.error || ('Server error ' + response.status));
    err.detail = data.detail || data.raw || data.message || JSON.stringify(data).slice(0, 600);
    throw err;
  }

  return {
    weekDate: weekDateISO,
    notes: userNotes,
    tuesday: data.tuesday || { subtitle: 'Reset + Plan Day', sections: [], notes: '' },
    thursday: data.thursday || { subtitle: 'Maintain + Prep Day', sections: [], notes: '' },
    weeklyExtras: data.weeklyExtras || { items: [], notes: '' },
    createdAt: new Date().toISOString()
  };
}

/* =====================================================================
   HELPERS
   ===================================================================== */
function fmtWeekDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function nextTuesdayISO() {
  const d = new Date();
  const day = d.getDay();
  const daysUntil = (2 - day + 7) % 7 || 7;
  d.setDate(d.getDate() + daysUntil);
  return d.toISOString().slice(0,10);
}
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function monthKey(iso) {
  if (!iso) return 'Unknown';
  const [y, m] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, 1);
  return dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

/* =====================================================================
   VIEW: DASHBOARD
   ===================================================================== */
function renderDashboard() {
  const main = document.getElementById('app-main');
  let warning = '';
  if (!state.configOk) {
    if (window.__CONFIG_MISSING) {
      warning = `
        <div class="config-warning">
          <strong>Setup needed: config.js not found</strong>
          Locally: copy <code>config.example.js</code> to <code>config.js</code> and fill in your Supabase values.
          On Netlify: set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> in
          Site configuration → Environment variables, then redeploy.
        </div>`;
    } else {
      warning = `
        <div class="config-warning">
          <strong>Setup needed: Supabase not configured</strong>
          The placeholder values in <code>config.js</code> haven't been replaced.
          See README for setup instructions.
        </div>`;
    }
  }
  main.innerHTML = warning + `
    <div class="card">
      <h2 class="card-title">Plan This Week</h2>
      <div class="card-subtitle">Tell the AI what's coming up</div>

      <div class="field-row">
        <div class="narrow">
          <label class="field" for="week-date">Week of</label>
          <input type="date" id="week-date" value="${nextTuesdayISO()}" />
        </div>
        <div></div>
      </div>

      <label class="field" for="notes-in">Your thoughts &amp; priorities</label>
      <textarea id="notes-in" placeholder="What's on your mind for this week? Examples: 'Liam's birthday party Saturday — 12 kids, prep gift bags and tidy living room. In-laws arriving Sunday for 3 days. Need to clean out garage corner. Kids soccer tournament Sat morning.'"></textarea>

      <div class="btn-row" style="margin-top: 16px;">
        <button class="btn" id="gen-btn">Generate Plan</button>
        <button class="btn btn-ghost" id="blank-btn">Skip — start blank</button>
      </div>
      <div id="gen-status"></div>
    </div>

    <div class="card">
      <h2 class="card-title">Standing Duties</h2>
      <div class="card-subtitle">Always included in every generated plan</div>
      <div class="duties-grid">
        <div class="duty-col">
          <div class="duty-col-title">Tuesday</div>
          <div id="duties-tue"></div>
          <button class="add-line add-section-btn" data-day="tuesday">+ Add Section</button>
        </div>
        <div class="duty-col">
          <div class="duty-col-title">Thursday</div>
          <div id="duties-thu"></div>
          <button class="add-line add-section-btn" data-day="thursday">+ Add Section</button>
        </div>
      </div>
      <div class="btn-row" style="margin-top: 14px;">
        <button class="btn btn-secondary" id="reset-duties">Reset to Defaults</button>
        <span style="font-size: 11px; color: var(--muted);">${state.configOk ? 'Changes save automatically' : 'Configure Supabase to save changes'}</span>
      </div>
    </div>
  `;
  renderDutiesCol('tuesday');
  renderDutiesCol('thursday');
  bindDashboardEvents();
}

function renderDutiesCol(day) {
  const wrap = document.getElementById('duties-' + (day === 'tuesday' ? 'tue' : 'thu'));
  const sections = state.standing[day];
  wrap.innerHTML = sections.map((s, si) => `
    <div class="duty-section" data-day="${day}" data-si="${si}">
      <div class="duty-section-head">
        <input type="text" value="${escapeHtml(s.heading)}" data-action="edit-heading" />
        <button class="ic-btn" data-action="del-section" title="Delete section">&times;</button>
      </div>
      <ul class="duty-tasks">
        ${s.tasks.map((t, ti) => `
          <li data-ti="${ti}">
            <input type="text" value="${escapeHtml(t)}" data-action="edit-task" />
            <button class="ic-btn" data-action="del-task" title="Delete task">&times;</button>
          </li>
        `).join('')}
      </ul>
      <button class="add-line" data-action="add-task">+ task</button>
    </div>
  `).join('');
}

function bindDashboardEvents() {
  document.getElementById('gen-btn').addEventListener('click', onGenerate);
  document.getElementById('blank-btn').addEventListener('click', onStartBlank);
  document.getElementById('reset-duties').addEventListener('click', async () => {
    if (!confirm('Reset standing duties to the original defaults? This will overwrite your edits.')) return;
    state.standing = JSON.parse(JSON.stringify(DEFAULT_STANDING));
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol('tuesday');
    renderDutiesCol('thursday');
  });

  ['duties-tue','duties-thu'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', onDutiesInput);
    el.addEventListener('click', onDutiesClick);
  });
  document.querySelectorAll('.add-section-btn').forEach(b => b.addEventListener('click', onAddSection));
}

let dutiesSaveTimer = null;
function debouncedSaveDuties() {
  clearTimeout(dutiesSaveTimer);
  dutiesSaveTimer = setTimeout(() => { if (state.configOk) saveStandingDuties(state.standing); }, 600);
}

async function onDutiesInput(e) {
  const t = e.target;
  if (t.tagName !== 'INPUT') return;
  const sec = t.closest('.duty-section');
  if (!sec) return;
  const day = sec.dataset.day;
  const si = +sec.dataset.si;
  if (t.dataset.action === 'edit-heading') {
    state.standing[day][si].heading = t.value;
  } else if (t.dataset.action === 'edit-task') {
    const li = t.closest('li');
    const ti = +li.dataset.ti;
    state.standing[day][si].tasks[ti] = t.value;
  }
  debouncedSaveDuties();
}

async function onDutiesClick(e) {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const sec = btn.closest('.duty-section');
  if (!sec) return;
  const day = sec.dataset.day;
  const si = +sec.dataset.si;
  if (btn.dataset.action === 'del-section') {
    if (!confirm('Delete this section?')) return;
    state.standing[day].splice(si, 1);
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol(day);
  } else if (btn.dataset.action === 'del-task') {
    const li = btn.closest('li');
    const ti = +li.dataset.ti;
    state.standing[day][si].tasks.splice(ti, 1);
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol(day);
  } else if (btn.dataset.action === 'add-task') {
    state.standing[day][si].tasks.push('New task');
    if (state.configOk) await saveStandingDuties(state.standing);
    renderDutiesCol(day);
    const cols = sec.parentElement.querySelectorAll('.duty-section');
    const lis = cols[si].querySelectorAll('.duty-tasks li');
    lis[lis.length-1]?.querySelector('input')?.focus();
  }
}

async function onAddSection(e) {
  const day = e.target.dataset.day;
  state.standing[day].push({ heading: 'New Section', tasks: ['New task'] });
  if (state.configOk) await saveStandingDuties(state.standing);
  renderDutiesCol(day);
}

async function onGenerate() {
  const weekDate = document.getElementById('week-date').value;
  const notes = document.getElementById('notes-in').value;
  const status = document.getElementById('gen-status');
  const btn = document.getElementById('gen-btn');
  if (!weekDate) { status.innerHTML = '<div class="error-box">Please pick a week date.</div>'; return; }
  btn.disabled = true;
  status.innerHTML = '<div class="status"><span class="spinner"></span> Drafting your plan…</div>';
  try {
    const recent = [];
    if (state.configOk) {
      for (const idx of state.plansIndex.slice(0, 3)) {
        const p = await loadPlan(idx.id);
        if (p) recent.push(p);
      }
    }
    const plan = await generatePlan(weekDate, notes, recent);
    state.currentPlan = plan;
    switchView('plan');
  } catch (err) {
    const detail = err.detail ? `<details><summary>Show details</summary><pre>${escapeHtml(err.detail)}</pre></details>` : '';
    status.innerHTML = `<div class="error-box"><strong>${escapeHtml(err.message)}</strong>${detail}</div>`;
    btn.disabled = false;
  }
}

function onStartBlank() {
  const weekDate = document.getElementById('week-date').value || nextTuesdayISO();
  state.currentPlan = {
    weekDate,
    notes: '',
    tuesday: { subtitle: 'Reset + Plan Day', sections: JSON.parse(JSON.stringify(state.standing.tuesday)), notes: '' },
    thursday: { subtitle: 'Maintain + Prep Day', sections: JSON.parse(JSON.stringify(state.standing.thursday)), notes: '' },
    weeklyExtras: { items: [], notes: '' },
    createdAt: new Date().toISOString()
  };
  switchView('plan');
}

/* =====================================================================
   VIEW: PLAN (editable printable)
   ===================================================================== */
function renderPlan() {
  const main = document.getElementById('app-main');
  const p = state.currentPlan;
  if (!p) { switchView('dashboard'); return; }

  const tile = (key, title, data) => `
    <article class="pp-tile" data-tile="${key}">
      <header class="pp-tile-header">
        <div class="pp-tile-heading">${title}</div>
        <div class="pp-tile-subtitle" contenteditable="true">${escapeHtml(data.subtitle || '')}</div>
      </header>
      ${(data.sections || []).map(s => sectionHtml(s)).join('')}
      <button class="ctrl ctrl-add-section" onclick="addSection(this)">+ Add Section</button>
      <div class="pp-notes">
        <div class="pp-notes-label">Notes</div>
        <div class="pp-notes-area" contenteditable="true">${escapeHtml(data.notes || '')}</div>
      </div>
    </article>
  `;

  main.innerHTML = `
    <div class="plan-toolbar">
      <button class="btn btn-ghost" id="back-btn">← Back to Dashboard</button>
      <div class="btn-row">
        <button class="btn btn-secondary" id="save-btn" ${state.configOk ? '' : 'disabled title="Configure Supabase to save"'}>${p.id ? 'Update Saved Plan' : 'Save to Library'}</button>
        <button class="btn" id="print-btn">Print</button>
      </div>
    </div>

    <div class="printable-wrap" id="printable">
      <header class="pp-title-block">
        <div class="pp-eyebrow">Week of ${escapeHtml(fmtWeekDate(p.weekDate))}</div>
        <h1 class="pp-title">House Manager Weekly Plan</h1>
      </header>

      <section class="pp-tiles">
        ${tile('tuesday', 'Tuesday', p.tuesday)}
        ${tile('thursday', 'Thursday', p.thursday)}
      </section>

      <section class="pp-extras" data-tile="weeklyExtras">
        <header class="pp-tile-header">
          <div class="pp-tile-heading">Weekly Extras</div>
          <div class="pp-tile-subtitle">As Time Allows</div>
        </header>
        <ul class="pp-extras-list">
          ${(p.weeklyExtras?.items || []).map(t => `
            <li><span contenteditable="true">${escapeHtml(t)}</span><button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button></li>
          `).join('')}
        </ul>
        <button class="ctrl ctrl-add-task" onclick="addExtra(this)">+ item</button>
        <div class="pp-notes">
          <div class="pp-notes-label">Notes</div>
          <div class="pp-notes-area" contenteditable="true">${escapeHtml(p.weeklyExtras?.notes || '')}</div>
        </div>
      </section>
    </div>
  `;

  document.getElementById('back-btn').addEventListener('click', () => switchView('dashboard'));
  document.getElementById('print-btn').addEventListener('click', () => window.print());
  document.getElementById('save-btn').addEventListener('click', onSavePlan);
}

function sectionHtml(s) {
  return `
    <div class="pp-section">
      <div class="pp-sec-head-row">
        <div class="pp-sec-heading" contenteditable="true">${escapeHtml(s.heading)}</div>
        <button class="ctrl ctrl-sec-x" onclick="delSection(this)">&times;</button>
      </div>
      <ul class="pp-tasks">
        ${(s.tasks||[]).map(t => `<li><span contenteditable="true">${escapeHtml(t)}</span><button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button></li>`).join('')}
      </ul>
      <button class="ctrl ctrl-add-task" onclick="addTask(this)">+ task</button>
    </div>
  `;
}

window.delSection = btn => btn.closest('.pp-section').remove();
window.delTask = btn => btn.closest('li').remove();
window.addTask = btn => {
  const ul = btn.previousElementSibling;
  const li = document.createElement('li');
  li.innerHTML = '<span contenteditable="true">New task</span><button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button>';
  ul.appendChild(li);
  selectAll(li.querySelector('span'));
};
window.addExtra = btn => {
  const ul = btn.previousElementSibling;
  const li = document.createElement('li');
  li.innerHTML = '<span contenteditable="true">New item</span><button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button>';
  ul.appendChild(li);
  selectAll(li.querySelector('span'));
};
window.addSection = btn => {
  const sec = document.createElement('div');
  sec.className = 'pp-section';
  sec.innerHTML = `
    <div class="pp-sec-head-row">
      <div class="pp-sec-heading" contenteditable="true">New Section</div>
      <button class="ctrl ctrl-sec-x" onclick="delSection(this)">&times;</button>
    </div>
    <ul class="pp-tasks"><li><span contenteditable="true">New task</span><button class="ctrl ctrl-task-x" onclick="delTask(this)">&times;</button></li></ul>
    <button class="ctrl ctrl-add-task" onclick="addTask(this)">+ task</button>
  `;
  btn.parentNode.insertBefore(sec, btn);
  selectAll(sec.querySelector('.pp-sec-heading'));
};
function selectAll(el) {
  el.focus();
  const r = document.createRange();
  r.selectNodeContents(el);
  const s = window.getSelection();
  s.removeAllRanges();
  s.addRange(r);
}

function readCurrentPlanFromDom() {
  const printable = document.getElementById('printable');
  const readTile = (sel) => {
    const tile = printable.querySelector(sel);
    const subtitle = tile.querySelector('.pp-tile-subtitle')?.innerText.trim() || '';
    const sections = Array.from(tile.querySelectorAll('.pp-section')).map(sec => ({
      heading: sec.querySelector('.pp-sec-heading')?.innerText.trim() || '',
      tasks: Array.from(sec.querySelectorAll('.pp-tasks li span')).map(s => s.innerText.trim()).filter(Boolean)
    }));
    const notes = tile.querySelector('.pp-notes-area')?.innerText.trim() || '';
    return { subtitle, sections, notes };
  };
  const extras = printable.querySelector('.pp-extras');
  const extrasItems = Array.from(extras.querySelectorAll('.pp-extras-list li span')).map(s => s.innerText.trim()).filter(Boolean);
  const extrasNotes = extras.querySelector('.pp-notes-area')?.innerText.trim() || '';
  return {
    ...state.currentPlan,
    tuesday: readTile('[data-tile="tuesday"]'),
    thursday: readTile('[data-tile="thursday"]'),
    weeklyExtras: { items: extrasItems, notes: extrasNotes }
  };
}

async function onSavePlan() {
  if (!state.configOk) return;
  const updated = readCurrentPlanFromDom();
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const id = await savePlan(updated);
    updated.id = id;
    state.currentPlan = updated;
    state.plansIndex = await loadPlansIndex();
    btn.textContent = 'Saved ✓';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Update Saved Plan';
    }, 1800);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Save failed — retry';
    console.error(e);
  }
}

/* =====================================================================
   VIEW: LIBRARY
   ===================================================================== */
function renderLibrary() {
  const main = document.getElementById('app-main');
  if (!state.configOk) {
    main.innerHTML = `
      <div class="config-warning">
        <strong>Setup needed</strong>
        Configure Supabase to use the library. See README for setup steps.
      </div>`;
    return;
  }
  if (!state.plansIndex.length) {
    main.innerHTML = `
      <div class="card">
        <h2 class="card-title">Library</h2>
        <div class="card-subtitle">Saved weekly plans, by month</div>
        <div class="empty">No saved plans yet. Generate a plan and tap "Save to Library" to start your collection.</div>
      </div>`;
    return;
  }
  const groups = {};
  state.plansIndex.forEach(p => {
    const k = monthKey(p.weekDate);
    (groups[k] = groups[k] || []).push(p);
  });
  const sortedKeys = Object.keys(groups).sort((a,b) => {
    const da = new Date(groups[a][0].weekDate);
    const db = new Date(groups[b][0].weekDate);
    return db - da;
  });
  main.innerHTML = `
    <div class="card">
      <h2 class="card-title">Library</h2>
      <div class="card-subtitle">Saved weekly plans, by month</div>
      ${sortedKeys.map(k => `
        <div class="month-group">
          <div class="month-head">${escapeHtml(k)}</div>
          ${groups[k].sort((a,b) => new Date(b.weekDate) - new Date(a.weekDate)).map(p => `
            <div class="plan-row">
              <div>
                <div class="plan-row-title">Week of ${escapeHtml(fmtWeekDate(p.weekDate))}</div>
                <div class="plan-row-meta">Saved ${new Date(p.savedAt).toLocaleDateString()}</div>
              </div>
              <div class="plan-row-actions">
                <button class="btn btn-secondary" data-action="open" data-id="${p.id}">Open</button>
                <button class="btn btn-ghost" data-action="del" data-id="${p.id}">Delete</button>
              </div>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `;
  main.querySelectorAll('button[data-action]').forEach(b => {
    b.addEventListener('click', async () => {
      const id = b.dataset.id;
      if (b.dataset.action === 'open') {
        const p = await loadPlan(id);
        if (p) { state.currentPlan = p; switchView('plan'); }
      } else if (b.dataset.action === 'del') {
        if (!confirm('Delete this plan permanently?')) return;
        await deletePlan(id);
        state.plansIndex = await loadPlansIndex();
        renderLibrary();
      }
    });
  });
}

/* =====================================================================
   VIEW SWITCHING
   ===================================================================== */
function switchView(v) {
  state.view = v;
  document.querySelectorAll('#nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v || (v === 'plan' && b.dataset.view === 'dashboard'));
  });
  if (v === 'dashboard') renderDashboard();
  else if (v === 'plan') renderPlan();
  else if (v === 'library') renderLibrary();
  window.scrollTo(0, 0);
}

document.getElementById('nav').addEventListener('click', e => {
  const b = e.target.closest('button[data-view]');
  if (b) switchView(b.dataset.view);
});

/* =====================================================================
   INIT
   ===================================================================== */
(async () => {
  state.configOk = initSupabase();
  if (state.configOk) {
    try {
      const loaded = await loadStandingDuties();
      if (loaded) {
        state.standing = loaded;
      } else {
        await saveStandingDuties(DEFAULT_STANDING);
      }
      state.plansIndex = await loadPlansIndex();
    } catch (e) {
      console.error('Initial load error:', e);
    }
  }
  switchView('dashboard');
})();
</script>
</body>
</html>
