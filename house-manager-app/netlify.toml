[build]
  publish = "."
  functions = "netlify/functions"
  command = "node scripts/build-config.js"

[functions]
  node_bundler = "esbuild"

# Pretty URL: /api/generate-plan → /.netlify/functions/generate-plan
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA-style fallback (for future routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
